<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreForge UI</title>
    <style>
        body {
            background-color: #000000;
            color: #000000;
            font-family: "Agency FB", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }

        .site-banner {
            width: 100%;
            height: auto;
            max-height: 12vh; 
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            min-height: 0;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .logo-img {
            width: 60%;
            max-width: 220px;
            height: auto;
        }

        .mainbody {
            background: #ffffff;
            width: 95%;
            max-width: 850px; 
            border-radius: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            padding: 25px 40px;
            display: flex;
            flex-direction: column;
        }

        .header-section {
            text-align: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .card-horizontal-layout {
            display: flex;
            flex-direction: row;
            /* This controls the gap between the two columns */
            justify-content: flex-start; 
            gap: 80px; 
            text-align: left;
        }

        .badge {
            background: #000000; 
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 1rem;
            display: inline-block;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 400;
        }

        .content-column {
            /* Remove flex: 1 to allow them to sit closer together on the left */
            min-width: fit-content;
        }

        h3 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            margin-top: 0;
        }

        .soon-header {
            margin-top: 0;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin: 4px 0;
            font-size: 1.1rem;
            white-space: nowrap; /* Prevents text wrapping to keep card height low */
        }

        ul li ul {
            list-style-type: square;
            margin-left: 25px;
        }

        .footer-link-container {
            width: 100%;
            text-align: center;
            margin-top: 20px;
        }

        .learn-more {
            display: inline-block;
            color: #0077ff; 
            text-decoration: none; 
            font-weight: bold;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .card-horizontal-layout { 
                flex-direction: column; 
                gap: 20px; 
                align-items: center;
                text-align: center;
            }
            .mainbody { padding: 20px; }
            h2 { font-size: 1.2rem; }
            li { white-space: normal; }
            ul li ul { margin-left: 0; list-style-position: inside; }
        }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/Casbian/CoreForge/main/root/assets/webbannertop.png" alt="" class="site-banner">

    <div class="main-content">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/Casbian/CoreForge/main/root/assets/IconBig.png" alt="CoreForge Logo" class="logo-img">
        </div>

        <div class="mainbody">
            <div class="header-section">
                <span class="badge">Work in Progress</span>
                <h2>Application to automate getting Updates on PC-Startup</h2>
            </div>

            <div class="card-horizontal-layout">
                <div class="content-column">
                    <h3>Features</h3>
                    <ul>
                        <li>Normal and Automatic Launch Mode</li>
                        <li>1 Click Update Button
                            <ul>
                                <li>Windows Update</li>
                                <li>Application Updates</li>
                            </ul>
                        </li>
                        <li>Device Information</li>
                    </ul>
                </div>

                <div class="content-column">
                    <h3 class="soon-header">Soon™</h3>
                    <ul>
                        <li>GPU Driver Implementation</li>
                        <li>More Settings</li>
                    </ul>
                </div>
            </div>

            <div class="footer-link-container">
                <a href="https://github.com/Casbian/CoreForge" class="learn-more">Learn More →</a>
            </div>
        </div>
    </div>

    <img src="https://raw.githubusercontent.com/Casbian/CoreForge/main/root/assets/webbannerbottom.png" alt="" class="site-banner">

</body>
</html>
